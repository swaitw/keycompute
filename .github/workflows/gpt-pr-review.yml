name: gpt-pr-review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@gpt review') &&
      github.actor != 'github-actions[bot]' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --disable-pip-version-check requests

      - name: Fetch PR metadata
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            -o pr.json

      - name: Fetch changed files
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            -o pr_files.json

      - name: Run GPT review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
          OPENAI_MAX_TOTAL_PATCH_CHARS: "40000"
          OPENAI_MAX_PATCH_CHARS_PER_FILE: "3000"
          OPENAI_MAX_FILES: "20"
          OPENAI_MAX_OUTPUT_TOKENS: "2000"
          OPENAI_RETRY_ATTEMPTS: "4"
          OPENAI_INITIAL_BACKOFF_SECONDS: "5"
          REPO_NAME: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.actor }}
        run: python scripts/github/review_pr.py

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          body = Path("review-output.md").read_text(encoding="utf-8")
          Path("review-comment.json").write_text(
              json.dumps({"body": body}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -d @review-comment.json
