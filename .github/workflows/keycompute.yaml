name: keycompute-coverage-test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:password@localhost:5432/keycompute
  REDIS_URL: redis://localhost:6379

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: keycompute
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo-tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin-v0.35.2

      - name: Setup configuration file
        run: |
          cp config.toml.example config.toml
          sed -i 's|url = "postgres://localhost/keycompute"|url = "postgres://postgres:password@localhost:5432/keycompute"|g' config.toml
          sed -i 's|url = "redis://127.0.0.1:6379"|url = "redis://localhost:6379"|g' config.toml

      - name: Build project
        run: cargo build --workspace --exclude desktop --exclude mobile --verbose

      - name: Run unit tests
        run: cargo test --lib --workspace --exclude desktop --exclude mobile --verbose

      - name: Run client-api integration tests
        run: cargo test --package client-api --tests --verbose

      - name: Run crates integration tests
        run: cargo test --package integration-tests --tests --verbose
        env:
          DATABASE_URL: postgres://postgres:password@localhost:5432/keycompute
          KC__DATABASE__URL: postgres://postgres:password@localhost:5432/keycompute
          KC__REDIS__URL: redis://localhost:6379
          KC__AUTH__JWT_SECRET: test-jwt-secret-for-ci

      - name: Generate coverage report
        run: |
          if [ ! -f ~/.cargo/bin/cargo-tarpaulin ]; then
            cargo install cargo-tarpaulin --version 0.35.2
          fi
          cargo tarpaulin --package integration-tests --out Xml --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  clippy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --workspace --exclude desktop --exclude mobile --all-targets --all-features --future-incompat-report -- -D warnings

  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check
